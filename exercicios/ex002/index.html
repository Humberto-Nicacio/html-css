<!DOCTYPE html>
<html lang="pt-br">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Parágrafos</title>
</head>
<body>
      <h1>Parágrafos e quebras de linha</h1>
      <hr>
      <p>&lt;p&gt; e &lt;/p&gt;</p>
      <!--lt: LESS THAN (menor que)
      gt: GREATER THAN (maior que)-->
      <p>seta para cima &uparrow; e &uarr; a primeira escrevi "uparrow" e na outra seta coloquei "uarr"</p>
      <!--Uparrow pode ser reduzido para uarr-->
      <p>emojis:
            &#x1F596;
            &#x1F913;
      </p>
</body>
</html>
