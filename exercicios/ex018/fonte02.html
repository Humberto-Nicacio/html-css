<!DOCTYPE html>
<html lang="pt-br">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Fontes Externas</title>
      <style>
            @font-face {
                  font-family: 'Old London';
                  src: url('fonts/OldLondon.ttf') format('truetype'), url('fonts/OldLondonAlternate.ttf') format('truetype'), url('fonts/Olondon_.otf') format('opentype'), url('fonts/Olondona.otf') format('opentype');
                  font-weight: normal;
                  font-style: normal;

                  /* 
                        Tipos de format()
                        - opentype (otf)
                        - truetype (ttf)
                        - embedded-opentype
                        - truetype-aat (Apple Advanced Typography)
                        - svg
                  */
            }
            body {
                  font-family: Arial, Helvetica, sans-serif;
            }

            h1 {
                  font-family: 'Old London', Times, serif;
                  font-size: 3rem;
                  font-weight: normal;
            }
      </style>
</head>
